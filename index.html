<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exact Replica Image Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Main Layout */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Controls */
        .sidebar {
            width: 380px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .control-group {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .control-group h3 {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-item {
            margin-bottom: 1rem;
        }

        .control-item:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        /* Editor Workspace */
        .workspace {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .canvas-container {
            position: relative;
            box-shadow: var(--shadow);
            background-color: white;
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        #editor-canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Upload Area */
        .upload-placeholder {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            max-width: 400px;
            width: 100%;
        }

        .upload-placeholder:hover {
            border-color: var(--primary);
        }

        .upload-placeholder svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* UI Components */
        button {
            cursor: pointer;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--bg);
            border-color: var(--text-muted);
        }

        button.primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary:hover {
            background: var(--primary-hover);
        }

        button.success {
            background: var(--success);
            color: white;
            border: none;
        }

        button.success:hover {
            background: #059669;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 0.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        /* Detected Text List */
        .detected-text-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
        }

        .text-item {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .text-item:hover {
            background: var(--border);
        }

        .text-item:last-child {
            border-bottom: none;
        }

        .text-item-content {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .text-item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        /* Status Messages */
        .status-message {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        .status-message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            box-shadow: var(--shadow);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 1rem;
        }

        .modal-content input {
            margin-bottom: 1rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .style-preview {
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            margin-bottom: 1rem;
            text-align: center;
        }

        /* Hidden elements */
        #file-input { display: none; }

        /* Responsive */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-top: 1px solid var(--border); }
            .workspace { height: 300px; }
            .header-actions { gap: 0.25rem; }
            button { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            Exact Replica Editor
        </div>
        <div class="header-actions">
            <button id="theme-toggle" title="Toggle Dark Mode">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
            <button id="undo-btn" disabled>Undo</button>
            <button id="redo-btn" disabled>Redo</button>
            <button id="reset-btn" disabled>Reset</button>
            <button id="download-btn" class="primary" disabled>Download</button>
        </div>
    </header>

    <main>
        <div class="sidebar">
            <div class="control-group">
                <h3>Image Source</h3>
                <button onclick="document.getElementById('file-input').click()" style="width:100%">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                    Upload Image
                </button>
                <input type="file" id="file-input" accept="image/*">
                <div id="status-message" class="status-message"></div>
            </div>

            <div class="control-group">
                <h3>Text Detection (OCR)</h3>
                <button id="detect-text-btn" disabled style="width:100%; margin-bottom:0.5rem">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
                    Detect Text
                </button>
                <div id="detected-text-list" class="detected-text-list" style="display:none;"></div>
            </div>

            <div class="control-group">
                <h3>Text Replacement</h3>
                <div class="control-item">
                    <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">Selected Text:</label>
                    <div id="selected-text-display" style="padding:0.5rem; background:var(--bg); border-radius:var(--radius); font-size:0.875rem; min-height:2rem; display:flex; align-items:center;">
                        <span style="color:var(--text-muted)">-- None selected --</span>
                    </div>
                </div>
                <div class="control-item">
                    <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">New Text:</label>
                    <input type="text" id="replacement-text" placeholder="Enter replacement text" disabled>
                </div>
                <button id="replace-text-btn" disabled style="width:100%">Replace with Auto-Style</button>
            </div>
        </div>

        <div class="workspace" id="drop-zone">
            <div class="upload-placeholder" id="upload-ui">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                <p>Drag and drop an image here<br>or click to upload</p>
            </div>

            <div class="canvas-container" id="canvas-ui">
                <canvas id="editor-canvas"></canvas>
            </div>
        </div>
    </main>

    <!-- Text Replacement Modal -->
    <div class="modal" id="replace-modal">
        <div class="modal-content">
            <h2>Replace Text with Auto-Style Matching</h2>
            
            <div class="control-item">
                <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">Original Text:</label>
                <div style="padding:0.5rem; background:var(--bg); border-radius:var(--radius); font-size:0.875rem; margin-bottom:1rem;">
                    <span id="modal-original-text"></span>
                </div>
            </div>

            <div class="style-preview" id="style-preview">
                <p style="margin-bottom:0.5rem; font-size:0.75rem; color:var(--text-muted)">Original Style Preview:</p>
                <canvas id="original-style-canvas" style="max-width:100%; max-height:150px;"></canvas>
            </div>

            <div class="control-item">
                <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">New Text:</label>
                <input type="text" id="modal-replacement-text" placeholder="Enter replacement text">
            </div>

            <div class="control-item">
                <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">Detected Font Size: <span id="detected-font-size">40</span>px</label>
                <input type="range" id="font-size-slider" min="8" max="200" value="40">
            </div>

            <div class="control-item">
                <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">Detected Text Color:</label>
                <input type="color" id="modal-text-color" value="#000000" style="height:40px; padding:2px">
            </div>

            <div class="control-item">
                <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">Font Family:</label>
                <select id="modal-font-family">
                    <option value="Arial">Arial (Sans-Serif)</option>
                    <option value="Georgia">Georgia (Serif)</option>
                    <option value="Times New Roman">Times New Roman (Serif)</option>
                    <option value="Courier New">Courier New (Monospace)</option>
                    <option value="Verdana">Verdana (Sans-Serif)</option>
                    <option value="Trebuchet MS">Trebuchet MS (Sans-Serif)</option>
                </select>
            </div>

            <div class="control-item">
                <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">Font Weight:</label>
                <select id="modal-font-weight">
                    <option value="normal">Normal</option>
                    <option value="bold">Bold</option>
                    <option value="lighter">Lighter</option>
                </select>
            </div>

            <div class="style-preview" id="new-style-preview">
                <p style="margin-bottom:0.5rem; font-size:0.75rem; color:var(--text-muted)">New Text Preview:</p>
                <canvas id="new-style-canvas" style="max-width:100%; max-height:150px;"></canvas>
            </div>

            <div class="modal-actions">
                <button onclick="closeReplaceModal()">Cancel</button>
                <button class="success" onclick="confirmReplace()">Apply Replacement</button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        const state = {
            originalImage: null,
            baseCanvas: null,
            detectedTexts: [],
            selectedTextIndex: -1,
            history: [],
            historyIndex: -1,
            textReplacements: []
        };

        // DOM Elements
        const fileInput = document.getElementById('file-input');
        const uploadUI = document.getElementById('upload-ui');
        const canvasUI = document.getElementById('canvas-ui');
        const editorCanvas = document.getElementById('editor-canvas');
        const ctx = editorCanvas.getContext('2d');
        const dropZone = document.getElementById('drop-zone');
        const statusMessage = document.getElementById('status-message');
        const detectTextBtn = document.getElementById('detect-text-btn');
        const detectedTextList = document.getElementById('detected-text-list');
        const replacementText = document.getElementById('replacement-text');
        const replaceTextBtn = document.getElementById('replace-text-btn');
        const selectedTextDisplay = document.getElementById('selected-text-display');

        // Initialization
        function init() {
            setupEventListeners();
            applyTheme();
        }

        function setupEventListeners() {
            fileInput.addEventListener('change', handleFileUpload);
            
            // Drag and Drop
            dropZone.addEventListener('dragover', (e) => e.preventDefault());
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) handleFile(file);
            });
            uploadUI.addEventListener('click', () => fileInput.click());

            // Text Detection
            detectTextBtn.addEventListener('click', detectTextInImage);

            // Text Replacement
            replaceTextBtn.addEventListener('click', openReplaceModal);

            // Actions
            document.getElementById('undo-btn').addEventListener('click', undo);
            document.getElementById('redo-btn').addEventListener('click', redo);
            document.getElementById('reset-btn').addEventListener('click', reset);
            document.getElementById('download-btn').addEventListener('click', download);

            document.getElementById('theme-toggle').addEventListener('click', () => {
                const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            });

            // Preview updates
            document.getElementById('modal-replacement-text').addEventListener('input', updateNewStylePreview);
            document.getElementById('font-size-slider').addEventListener('input', updateNewStylePreview);
            document.getElementById('modal-text-color').addEventListener('input', updateNewStylePreview);
            document.getElementById('modal-font-family').addEventListener('change', updateNewStylePreview);
            document.getElementById('modal-font-weight').addEventListener('change', updateNewStylePreview);
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (file) handleFile(file);
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    state.originalImage = img;
                    initializeBaseCanvas();
                    resetState();
                    enableControls();
                    render();
                    uploadUI.style.display = 'none';
                    canvasUI.style.display = 'block';
                    showStatus(`Image loaded: ${img.width}x${img.height}px`, 'success');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function initializeBaseCanvas() {
            state.baseCanvas = document.createElement('canvas');
            state.baseCanvas.width = state.originalImage.width;
            state.baseCanvas.height = state.originalImage.height;
            const baseCtx = state.baseCanvas.getContext('2d');
            baseCtx.drawImage(state.originalImage, 0, 0);
        }

        async function detectTextInImage() {
            if (!state.originalImage) return;
            
            showStatus('Detecting text... This may take a moment', 'info');
            detectTextBtn.disabled = true;

            try {
                const result = await Tesseract.recognize(state.originalImage.src, 'eng', {
                    logger: m => console.log(m)
                });

                state.detectedTexts = [];
                const words = result.data.words.filter(w => w.confidence > 30);
                
                words.forEach(word => {
                    state.detectedTexts.push({
                        text: word.text,
                        bbox: word.bbox,
                        confidence: word.confidence,
                        fontSize: null,
                        color: null
                    });
                });

                // Estimate font size and color for each detected text
                estimateTextProperties();
                displayDetectedTexts();
                showStatus(`Detected ${state.detectedTexts.length} text elements`, 'success');
            } catch (error) {
                showStatus(`OCR Error: ${error.message}`, 'error');
                console.error(error);
            } finally {
                detectTextBtn.disabled = false;
            }
        }

        function estimateTextProperties() {
            state.detectedTexts.forEach(item => {
                const height = item.bbox.y1 - item.bbox.y0;
                item.fontSize = Math.max(12, Math.round(height * 0.8));
                
                // Sample color from center of text area
                const centerX = Math.round((item.bbox.x0 + item.bbox.x1) / 2);
                const centerY = Math.round((item.bbox.y0 + item.bbox.y1) / 2);
                
                const imageData = ctx.getImageData(centerX, centerY, 1, 1);
                const data = imageData.data;
                item.color = `rgb(${data[0]}, ${data[1]}, ${data[2]})`;
                item.colorHex = rgbToHex(data[0], data[1], data[2]);
            });
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function displayDetectedTexts() {
            detectedTextList.innerHTML = '';
            state.detectedTexts.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'text-item';
                div.style.cursor = 'pointer';
                div.innerHTML = `
                    <div>
                        <div class="text-item-content">"${item.text}"</div>
                        <div class="text-item-meta">${item.fontSize}px • ${Math.round(item.confidence)}%</div>
                    </div>
                `;
                div.addEventListener('click', () => selectDetectedText(idx));
                detectedTextList.appendChild(div);
            });

            detectedTextList.style.display = state.detectedTexts.length > 0 ? 'block' : 'none';
        }

        function selectDetectedText(idx) {
            state.selectedTextIndex = idx;
            const item = state.detectedTexts[idx];
            selectedTextDisplay.innerHTML = `<strong>"${item.text}"</strong> (${item.fontSize}px)`;
            replacementText.value = item.text;
            replacementText.disabled = false;
            replaceTextBtn.disabled = false;
        }

        function openReplaceModal() {
            if (state.selectedTextIndex < 0) return;

            const item = state.detectedTexts[state.selectedTextIndex];
            document.getElementById('modal-original-text').textContent = `"${item.text}"`;
            document.getElementById('modal-replacement-text').value = replacementText.value;
            document.getElementById('font-size-slider').value = item.fontSize;
            document.getElementById('detected-font-size').textContent = item.fontSize;
            document.getElementById('modal-text-color').value = item.colorHex;

            drawOriginalStylePreview(item);
            updateNewStylePreview();

            document.getElementById('replace-modal').classList.add('show');
        }

        function drawOriginalStylePreview(item) {
            const canvas = document.getElementById('original-style-canvas');
            const canvasCtx = canvas.getContext('2d');
            
            canvas.width = 400;
            canvas.height = 100;
            
            canvasCtx.fillStyle = '#f8fafc';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            
            canvasCtx.fillStyle = item.color;
            canvasCtx.font = `bold ${item.fontSize}px Arial`;
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText(item.text, canvas.width / 2, canvas.height / 2);
        }

        function updateNewStylePreview() {
            const canvas = document.getElementById('new-style-canvas');
            const canvasCtx = canvas.getContext('2d');
            const text = document.getElementById('modal-replacement-text').value || 'Preview';
            const fontSize = document.getElementById('font-size-slider').value;
            const color = document.getElementById('modal-text-color').value;
            const fontFamily = document.getElementById('modal-font-family').value;
            const fontWeight = document.getElementById('modal-font-weight').value;

            document.getElementById('detected-font-size').textContent = fontSize;

            canvas.width = 400;
            canvas.height = 100;
            
            canvasCtx.fillStyle = '#f8fafc';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            
            canvasCtx.fillStyle = color;
            canvasCtx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText(text, canvas.width / 2, canvas.height / 2);
        }

        function closeReplaceModal() {
            document.getElementById('replace-modal').classList.remove('show');
        }

        function confirmReplace() {
            const item = state.detectedTexts[state.selectedTextIndex];
            const newText = document.getElementById('modal-replacement-text').value;
            const fontSize = parseInt(document.getElementById('font-size-slider').value);
            const color = document.getElementById('modal-text-color').value;
            const fontFamily = document.getElementById('modal-font-family').value;
            const fontWeight = document.getElementById('modal-font-weight').value;

            if (!newText) return;

            // Store replacement
            state.textReplacements.push({
                originalBbox: item.bbox,
                originalText: item.text,
                newText: newText,
                fontSize: fontSize,
                color: color,
                fontFamily: fontFamily,
                fontWeight: fontWeight
            });

            saveHistory();
            render();
            closeReplaceModal();
            showStatus(`Text replaced: "${item.text}" → "${newText}"`, 'success');
        }

        function resetState() {
            state.textReplacements = [];
            state.detectedTexts = [];
            state.selectedTextIndex = -1;
            state.history = [];
            state.historyIndex = -1;
            selectedTextDisplay.innerHTML = '<span style="color:var(--text-muted)">-- None selected --</span>';
            replacementText.value = '';
            replacementText.disabled = true;
            replaceTextBtn.disabled = true;
            saveHistory();
        }

        function enableControls() {
            const controls = document.querySelectorAll('button, input, select');
            controls.forEach(c => {
                if (c.id !== 'file-input' && c.id !== 'theme-toggle') c.disabled = false;
            });
            detectTextBtn.disabled = false;
            replaceTextBtn.disabled = true;
            replacementText.disabled = true;
            updateUndoRedoButtons();
        }

        function render() {
            if (!state.originalImage) return;

            editorCanvas.width = state.originalImage.width;
            editorCanvas.height = state.originalImage.height;

            // Start with base image
            ctx.drawImage(state.originalImage, 0, 0);

            // Apply text replacements
            state.textReplacements.forEach(replacement => {
                const bbox = replacement.originalBbox;
                const width = bbox.x1 - bbox.x0;
                const height = bbox.y1 - bbox.y0;

                // Patch the background (erase original text)
                const patchData = state.baseCanvas.getContext('2d').getImageData(
                    Math.max(0, bbox.x0 - 2),
                    Math.max(0, bbox.y0 - 2),
                    Math.min(state.baseCanvas.width, width + 4),
                    Math.min(state.baseCanvas.height, height + 4)
                );

                ctx.putImageData(
                    patchData,
                    Math.max(0, bbox.x0 - 2),
                    Math.max(0, bbox.y0 - 2)
                );

                // Draw new text
                ctx.fillStyle = replacement.color;
                ctx.font = `${replacement.fontWeight} ${replacement.fontSize}px ${replacement.fontFamily}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(
                    replacement.newText,
                    bbox.x0 + width / 2,
                    bbox.y0 + height / 2
                );
            });
        }

        function saveHistory() {
            const snapshot = JSON.stringify({
                textReplacements: JSON.parse(JSON.stringify(state.textReplacements))
            });
            
            if (state.historyIndex < state.history.length - 1) {
                state.history = state.history.slice(0, state.historyIndex + 1);
            }
            
            state.history.push(snapshot);
            state.historyIndex++;
            
            if (state.history.length > 20) {
                state.history.shift();
                state.historyIndex--;
            }
            
            updateUndoRedoButtons();
        }

        function undo() {
            if (state.historyIndex > 0) {
                state.historyIndex--;
                applyHistoryState();
            }
        }

        function redo() {
            if (state.historyIndex < state.history.length - 1) {
                state.historyIndex++;
                applyHistoryState();
            }
        }

        function applyHistoryState() {
            const data = JSON.parse(state.history[state.historyIndex]);
            state.textReplacements = data.textReplacements;
            render();
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undo-btn').disabled = state.historyIndex <= 0;
            document.getElementById('redo-btn').disabled = state.historyIndex >= state.history.length - 1;
        }

        function reset() {
            if (confirm('Are you sure you want to reset all changes?')) {
                resetState();
                render();
                showStatus('All changes reset', 'info');
            }
        }

        function download() {
            const link = document.createElement('a');
            link.download = 'exact-replica-image.png';
            link.href = editorCanvas.toDataURL('image/png');
            link.click();
            showStatus('Image downloaded', 'success');
        }

        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message show ${type}`;
            setTimeout(() => {
                statusMessage.classList.remove('show');
            }, 4000);
        }

        function applyTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
        }

        init();
    </script>
</body>
</html>
