<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Editor with OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Main Layout */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Controls */
        .sidebar {
            width: 360px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .control-group {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .control-group h3 {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-item {
            margin-bottom: 1rem;
        }

        .control-item:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        /* Editor Workspace */
        .workspace {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .canvas-container {
            position: relative;
            box-shadow: var(--shadow);
            background-color: white;
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        #editor-canvas {
            max-width: 100%;
            height: auto;
            display: block;
            cursor: crosshair;
        }

        /* Upload Area */
        .upload-placeholder {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            max-width: 400px;
            width: 100%;
        }

        .upload-placeholder:hover {
            border-color: var(--primary);
        }

        .upload-placeholder svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* UI Components */
        button {
            cursor: pointer;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--bg);
            border-color: var(--text-muted);
        }

        button.primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary:hover {
            background: var(--primary-hover);
        }

        button.success {
            background: var(--success);
            color: white;
            border: none;
        }

        button.success:hover {
            background: #059669;
        }

        button.danger {
            background: var(--danger);
            color: white;
            border: none;
        }

        button.danger:hover {
            background: #dc2626;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 0.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .tool-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
        }

        /* Detected Text List */
        .detected-text-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
        }

        .text-item {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .text-item:last-child {
            border-bottom: none;
        }

        .text-item-content {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .text-item button {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
        }

        /* Status Messages */
        .status-message {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        .status-message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .status-message.warning {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow);
        }

        .modal-content h2 {
            margin-bottom: 1rem;
        }

        .modal-content input {
            margin-bottom: 1rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        /* Hidden elements */
        #file-input { display: none; }

        /* Responsive */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-top: 1px solid var(--border); }
            .workspace { height: 300px; }
            .header-actions { gap: 0.25rem; }
            button { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            Advanced Editor
        </div>
        <div class="header-actions">
            <button id="theme-toggle" title="Toggle Dark Mode">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
            <button id="undo-btn" disabled>Undo</button>
            <button id="redo-btn" disabled>Redo</button>
            <button id="reset-btn" disabled>Reset</button>
            <button id="download-btn" class="primary" disabled>Download</button>
        </div>
    </header>

    <main>
        <div class="sidebar">
            <div class="control-group">
                <h3>Image Source</h3>
                <button onclick="document.getElementById('file-input').click()" style="width:100%">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                    Upload Image
                </button>
                <input type="file" id="file-input" accept="image/*">
                <div id="status-message" class="status-message"></div>
            </div>

            <div class="control-group">
                <h3>Text Detection (OCR)</h3>
                <button id="detect-text-btn" disabled style="width:100%; margin-bottom:0.5rem">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
                    Detect Text
                </button>
                <div id="detected-text-list" class="detected-text-list" style="display:none;"></div>
            </div>

            <div class="control-group">
                <h3>Text Replacement</h3>
                <div class="control-item">
                    <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">Select Text to Replace:</label>
                    <select id="text-select" disabled style="margin-bottom:0.5rem">
                        <option value="">-- Choose detected text --</option>
                    </select>
                </div>
                <div class="control-item">
                    <label style="font-size:0.875rem; margin-bottom:0.5rem; display:block">New Text:</label>
                    <input type="text" id="replacement-text" placeholder="Enter replacement text" disabled>
                </div>
                <button id="replace-text-btn" disabled style="width:100%; margin-bottom:0.5rem">Replace Text</button>
            </div>

            <div class="control-group">
                <h3>Transform</h3>
                <div class="tool-grid">
                    <button id="rotate-l-btn" disabled>Rotate L</button>
                    <button id="rotate-r-btn" disabled>Rotate R</button>
                    <button id="flip-h-btn" disabled>Flip H</button>
                    <button id="flip-v-btn" disabled>Flip V</button>
                </div>
            </div>

            <div class="control-group">
                <h3>Adjustments</h3>
                <div class="control-item">
                    <div class="control-label"><span>Brightness</span><span id="brightness-val">100%</span></div>
                    <input type="range" id="brightness-slider" min="0" max="200" value="100" disabled>
                </div>
                <div class="control-item">
                    <div class="control-label"><span>Contrast</span><span id="contrast-val">100%</span></div>
                    <input type="range" id="contrast-slider" min="0" max="200" value="100" disabled>
                </div>
                <div class="control-item">
                    <div class="control-label"><span>Saturation</span><span id="saturation-val">100%</span></div>
                    <input type="range" id="saturation-slider" min="0" max="200" value="100" disabled>
                </div>
            </div>

            <div class="control-group">
                <h3>Add New Text</h3>
                <div class="control-item">
                    <input type="text" id="text-input" placeholder="Enter text..." disabled>
                </div>
                <div class="tool-grid">
                    <input type="color" id="text-color" value="#000000" disabled style="height:38px; padding:2px">
                    <input type="number" id="text-size" value="40" min="10" max="200" disabled>
                </div>
                <select id="font-family" disabled style="margin-bottom:0.5rem">
                    <option value="Arial">Arial</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Verdana">Verdana</option>
                </select>
                <button id="add-text-btn" disabled style="width:100%">Add Text</button>
            </div>
        </div>

        <div class="workspace" id="drop-zone">
            <div class="upload-placeholder" id="upload-ui">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                <p>Drag and drop an image here<br>or click to upload</p>
            </div>

            <div class="canvas-container" id="canvas-ui">
                <canvas id="editor-canvas"></canvas>
            </div>
        </div>
    </main>

    <!-- Text Replacement Modal -->
    <div class="modal" id="replace-modal">
        <div class="modal-content">
            <h2>Replace Text</h2>
            <p id="modal-original-text" style="margin-bottom:1rem; font-size:0.875rem; color:var(--text-muted)"></p>
            <input type="text" id="modal-replacement-text" placeholder="Enter new text">
            <div class="modal-actions">
                <button onclick="closeReplaceModal()">Cancel</button>
                <button class="primary" onclick="confirmReplace()">Replace</button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        const state = {
            originalImage: null,
            detectedTexts: [],
            selectedTextIndex: -1,
            history: [],
            historyIndex: -1,
            rotation: 0,
            flipH: 1,
            flipV: 1,
            filters: {
                brightness: 100,
                contrast: 100,
                saturation: 100
            },
            textOverlays: [],
            replacedTexts: {} // Track which texts have been replaced
        };

        // DOM Elements
        const fileInput = document.getElementById('file-input');
        const uploadUI = document.getElementById('upload-ui');
        const canvasUI = document.getElementById('canvas-ui');
        const editorCanvas = document.getElementById('editor-canvas');
        const ctx = editorCanvas.getContext('2d');
        const dropZone = document.getElementById('drop-zone');
        const statusMessage = document.getElementById('status-message');
        const detectTextBtn = document.getElementById('detect-text-btn');
        const detectedTextList = document.getElementById('detected-text-list');
        const textSelect = document.getElementById('text-select');
        const replacementText = document.getElementById('replacement-text');
        const replaceTextBtn = document.getElementById('replace-text-btn');

        // Initialization
        function init() {
            setupEventListeners();
            applyTheme();
        }

        function setupEventListeners() {
            fileInput.addEventListener('change', handleFileUpload);
            
            // Drag and Drop
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) handleFile(file);
            });
            uploadUI.addEventListener('click', () => fileInput.click());

            // Text Detection
            detectTextBtn.addEventListener('click', detectTextInImage);

            // Text Replacement
            textSelect.addEventListener('change', (e) => {
                state.selectedTextIndex = parseInt(e.target.value);
                replacementText.disabled = state.selectedTextIndex === -1;
                replaceTextBtn.disabled = state.selectedTextIndex === -1;
            });

            replaceTextBtn.addEventListener('click', () => {
                if (state.selectedTextIndex >= 0 && state.selectedTextIndex < state.detectedTexts.length) {
                    const original = state.detectedTexts[state.selectedTextIndex];
                    document.getElementById('modal-original-text').textContent = `Original: "${original.text}"`;
                    document.getElementById('modal-replacement-text').value = replacementText.value;
                    document.getElementById('replace-modal').classList.add('show');
                }
            });

            // Adjustments
            document.getElementById('brightness-slider').addEventListener('input', (e) => {
                state.filters.brightness = e.target.value;
                document.getElementById('brightness-val').textContent = e.target.value + '%';
                render();
            });
            document.getElementById('contrast-slider').addEventListener('input', (e) => {
                state.filters.contrast = e.target.value;
                document.getElementById('contrast-val').textContent = e.target.value + '%';
                render();
            });
            document.getElementById('saturation-slider').addEventListener('input', (e) => {
                state.filters.saturation = e.target.value;
                document.getElementById('saturation-val').textContent = e.target.value + '%';
                render();
            });

            // Transforms
            document.getElementById('rotate-l-btn').addEventListener('click', () => { state.rotation -= 90; saveHistory(); render(); });
            document.getElementById('rotate-r-btn').addEventListener('click', () => { state.rotation += 90; saveHistory(); render(); });
            document.getElementById('flip-h-btn').addEventListener('click', () => { state.flipH *= -1; saveHistory(); render(); });
            document.getElementById('flip-v-btn').addEventListener('click', () => { state.flipV *= -1; saveHistory(); render(); });

            // Text
            document.getElementById('add-text-btn').addEventListener('click', addTextOverlay);

            // Actions
            document.getElementById('undo-btn').addEventListener('click', undo);
            document.getElementById('redo-btn').addEventListener('click', redo);
            document.getElementById('reset-btn').addEventListener('click', reset);
            document.getElementById('download-btn').addEventListener('click', download);

            document.getElementById('theme-toggle').addEventListener('click', () => {
                const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            });
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (file) handleFile(file);
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    state.originalImage = img;
                    resetState();
                    enableControls();
                    render();
                    uploadUI.style.display = 'none';
                    canvasUI.style.display = 'block';
                    showStatus(`Image loaded: ${img.width}x${img.height}px`, 'success');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function detectTextInImage() {
            if (!state.originalImage) return;
            
            showStatus('Detecting text... This may take a moment', 'info');
            detectTextBtn.disabled = true;

            try {
                const result = await Tesseract.recognize(state.originalImage.src, 'eng', {
                    logger: m => console.log(m)
                });

                state.detectedTexts = [];
                const words = result.data.words.filter(w => w.confidence > 30);
                
                words.forEach(word => {
                    state.detectedTexts.push({
                        text: word.text,
                        bbox: word.bbox,
                        confidence: word.confidence
                    });
                });

                displayDetectedTexts();
                showStatus(`Detected ${state.detectedTexts.length} text elements`, 'success');
            } catch (error) {
                showStatus(`OCR Error: ${error.message}`, 'error');
                console.error(error);
            } finally {
                detectTextBtn.disabled = false;
            }
        }

        function displayDetectedTexts() {
            detectedTextList.innerHTML = '';
            textSelect.innerHTML = '<option value="">-- Choose detected text --</option>';

            state.detectedTexts.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'text-item';
                div.innerHTML = `
                    <span class="text-item-content" title="${item.text}">${item.text}</span>
                    <button onclick="selectDetectedText(${idx})" style="padding:0.25rem 0.5rem">Select</button>
                `;
                detectedTextList.appendChild(div);

                const option = document.createElement('option');
                option.value = idx;
                option.textContent = item.text;
                textSelect.appendChild(option);
            });

            detectedTextList.style.display = state.detectedTexts.length > 0 ? 'block' : 'none';
            textSelect.disabled = state.detectedTexts.length === 0;
        }

        function selectDetectedText(idx) {
            textSelect.value = idx;
            state.selectedTextIndex = idx;
            replacementText.value = state.detectedTexts[idx].text;
            replacementText.disabled = false;
            replaceTextBtn.disabled = false;
        }

        function addTextOverlay() {
            const text = document.getElementById('text-input').value;
            if (!text) return;

            state.textOverlays.push({
                text: text,
                color: document.getElementById('text-color').value,
                size: parseInt(document.getElementById('text-size').value),
                font: document.getElementById('font-family').value,
                x: editorCanvas.width / 2,
                y: editorCanvas.height / 2
            });

            document.getElementById('text-input').value = '';
            saveHistory();
            render();
            showStatus('Text added', 'success');
        }

        function resetState() {
            state.rotation = 0;
            state.flipH = 1;
            state.flipV = 1;
            state.filters = { brightness: 100, contrast: 100, saturation: 100 };
            state.textOverlays = [];
            state.detectedTexts = [];
            state.replacedTexts = {};
            state.history = [];
            state.historyIndex = -1;
            saveHistory();
            updateSliders();
        }

        function updateSliders() {
            document.getElementById('brightness-slider').value = state.filters.brightness;
            document.getElementById('contrast-slider').value = state.filters.contrast;
            document.getElementById('saturation-slider').value = state.filters.saturation;
            document.getElementById('brightness-val').textContent = state.filters.brightness + '%';
            document.getElementById('contrast-val').textContent = state.filters.contrast + '%';
            document.getElementById('saturation-val').textContent = state.filters.saturation + '%';
        }

        function enableControls() {
            const controls = document.querySelectorAll('button, input, select');
            controls.forEach(c => {
                if (c.id !== 'file-input' && c.id !== 'theme-toggle') c.disabled = false;
            });
            detectTextBtn.disabled = false;
            updateUndoRedoButtons();
        }

        function render() {
            if (!state.originalImage) return;

            const img = state.originalImage;
            const isVertical = (state.rotation / 90) % 2 !== 0;
            const width = isVertical ? img.height : img.width;
            const height = isVertical ? img.width : img.height;
            
            editorCanvas.width = width;
            editorCanvas.height = height;

            ctx.clearRect(0, 0, width, height);
            
            // Apply Filters
            ctx.filter = `
                brightness(${state.filters.brightness}%) 
                contrast(${state.filters.contrast}%) 
                saturate(${state.filters.saturation}%)
            `;

            // Apply Transforms
            ctx.save();
            ctx.translate(width / 2, height / 2);
            ctx.rotate((state.rotation * Math.PI) / 180);
            ctx.scale(state.flipH, state.flipV);
            ctx.drawImage(img, -img.width / 2, -img.height / 2);
            ctx.restore();

            // Reset filter for text
            ctx.filter = 'none';

            // Draw Text Overlays
            state.textOverlays.forEach(item => {
                ctx.fillStyle = item.color;
                ctx.font = `bold ${item.size}px ${item.font}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.text, item.x, item.y);
            });
        }

        function saveHistory() {
            const snapshot = JSON.stringify({
                rotation: state.rotation,
                flipH: state.flipH,
                flipV: state.flipV,
                filters: { ...state.filters },
                textOverlays: [...state.textOverlays],
                replacedTexts: { ...state.replacedTexts }
            });
            
            if (state.historyIndex < state.history.length - 1) {
                state.history = state.history.slice(0, state.historyIndex + 1);
            }
            
            state.history.push(snapshot);
            state.historyIndex++;
            
            if (state.history.length > 20) {
                state.history.shift();
                state.historyIndex--;
            }
            
            updateUndoRedoButtons();
        }

        function undo() {
            if (state.historyIndex > 0) {
                state.historyIndex--;
                applyHistoryState();
            }
        }

        function redo() {
            if (state.historyIndex < state.history.length - 1) {
                state.historyIndex++;
                applyHistoryState();
            }
        }

        function applyHistoryState() {
            const data = JSON.parse(state.history[state.historyIndex]);
            state.rotation = data.rotation;
            state.flipH = data.flipH;
            state.flipV = data.flipV;
            state.filters = data.filters;
            state.textOverlays = data.textOverlays;
            state.replacedTexts = data.replacedTexts;
            updateSliders();
            render();
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undo-btn').disabled = state.historyIndex <= 0;
            document.getElementById('redo-btn').disabled = state.historyIndex >= state.history.length - 1;
        }

        function reset() {
            if (confirm('Are you sure you want to reset all changes?')) {
                resetState();
                render();
                showStatus('All changes reset', 'info');
            }
        }

        function download() {
            const link = document.createElement('a');
            link.download = 'edited-image.png';
            link.href = editorCanvas.toDataURL('image/png');
            link.click();
            showStatus('Image downloaded', 'success');
        }

        function closeReplaceModal() {
            document.getElementById('replace-modal').classList.remove('show');
        }

        function confirmReplace() {
            const newText = document.getElementById('modal-replacement-text').value;
            if (!newText || state.selectedTextIndex < 0) return;

            const original = state.detectedTexts[state.selectedTextIndex];
            state.replacedTexts[original.text] = newText;

            // Add as text overlay
            state.textOverlays.push({
                text: newText,
                color: '#000000',
                size: 40,
                font: 'Arial',
                x: original.bbox.x0 + (original.bbox.x1 - original.bbox.x0) / 2,
                y: original.bbox.y0 + (original.bbox.y1 - original.bbox.y0) / 2
            });

            saveHistory();
            render();
            closeReplaceModal();
            showStatus(`Text replaced: "${original.text}" → "${newText}"`, 'success');
        }

        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message show ${type}`;
            setTimeout(() => {
                statusMessage.classList.remove('show');
            }, 4000);
        }

        function applyTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
        }

        init();
    </script>
</body>
</html>
