<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Image Editor</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        /* Main Layout */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Controls */
        .sidebar {
            width: 320px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .control-group {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .control-group h3 {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-item {
            margin-bottom: 1rem;
        }

        .control-item:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        /* Editor Workspace */
        .workspace {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .canvas-container {
            position: relative;
            box-shadow: var(--shadow);
            background-color: white;
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        #editor-canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Upload Area */
        .upload-placeholder {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            max-width: 400px;
            width: 100%;
        }

        .upload-placeholder:hover {
            border-color: var(--primary);
        }

        .upload-placeholder svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* UI Components */
        button {
            cursor: pointer;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--bg);
            border-color: var(--text-muted);
        }

        button.primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 0.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        /* Comparison Mode */
        .comparison-container {
            display: none;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            height: 100%;
        }

        .comparison-view {
            display: flex;
            gap: 1rem;
            flex: 1;
            min-height: 0;
        }

        .comparison-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
        }

        .comparison-pane h4 {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .comparison-pane .img-wrap {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eee;
            border-radius: var(--radius);
            overflow: auto;
        }

        .comparison-pane img, .comparison-pane canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: var(--shadow);
        }

        /* Info Panel */
        .info-panel {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            display: none;
        }

        /* Hidden elements */
        #file-input { display: none; }

        /* Responsive */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-top: 1px solid var(--border); }
            .workspace { height: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            Precision Editor
        </div>
        <div class="header-actions">
            <button id="theme-toggle" title="Toggle Dark Mode">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
            <button id="undo-btn" disabled>Undo</button>
            <button id="redo-btn" disabled>Redo</button>
            <button id="reset-btn" disabled>Reset</button>
            <button id="download-btn" class="primary" disabled>Download</button>
        </div>
    </header>

    <main>
        <div class="sidebar">
            <div class="control-group">
                <h3>Image Source</h3>
                <button onclick="document.getElementById('file-input').click()" style="width:100%">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                    Upload Image
                </button>
                <input type="file" id="file-input" accept="image/*">
            </div>

            <div class="control-group">
                <h3>Transform</h3>
                <div class="tool-grid">
                    <button id="rotate-l-btn" disabled>Rotate L</button>
                    <button id="rotate-r-btn" disabled>Rotate R</button>
                    <button id="flip-h-btn" disabled>Flip H</button>
                    <button id="flip-v-btn" disabled>Flip V</button>
                </div>
            </div>

            <div class="control-group">
                <h3>Adjustments</h3>
                <div class="control-item">
                    <div class="control-label"><span>Brightness</span><span id="brightness-val">100%</span></div>
                    <input type="range" id="brightness-slider" min="0" max="200" value="100" disabled>
                </div>
                <div class="control-item">
                    <div class="control-label"><span>Contrast</span><span id="contrast-val">100%</span></div>
                    <input type="range" id="contrast-slider" min="0" max="200" value="100" disabled>
                </div>
                <div class="control-item">
                    <div class="control-label"><span>Saturation</span><span id="saturation-val">100%</span></div>
                    <input type="range" id="saturation-slider" min="0" max="200" value="100" disabled>
                </div>
                <div class="control-item">
                    <div class="control-label"><span>Blur</span><span id="blur-val">0px</span></div>
                    <input type="range" id="blur-slider" min="0" max="20" value="0" disabled>
                </div>
            </div>

            <div class="control-group">
                <h3>Text Overlay</h3>
                <div class="control-item">
                    <input type="text" id="text-input" placeholder="Enter text..." disabled>
                </div>
                <div class="tool-grid">
                    <input type="color" id="text-color" value="#ffffff" disabled style="height:38px; padding:2px">
                    <input type="number" id="text-size" value="40" min="10" max="200" disabled>
                </div>
                <button id="add-text-btn" disabled style="width:100%; margin-top:0.5rem">Add Text</button>
            </div>

            <div class="control-group">
                <h3>View Options</h3>
                <div class="control-item" style="display:flex; align-items:center; gap:0.5rem">
                    <input type="checkbox" id="compare-toggle" disabled>
                    <label for="compare-toggle" style="font-size:0.875rem">Side-by-Side Comparison</label>
                </div>
            </div>
        </div>

        <div class="workspace" id="drop-zone">
            <div class="upload-placeholder" id="upload-ui">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                <p>Drag and drop an image here<br>or click to upload</p>
            </div>

            <div class="canvas-container" id="canvas-ui">
                <canvas id="editor-canvas"></canvas>
            </div>

            <div class="comparison-container" id="comparison-ui">
                <div class="comparison-view">
                    <div class="comparison-pane">
                        <h4>Original</h4>
                        <div class="img-wrap"><img id="original-preview"></div>
                    </div>
                    <div class="comparison-pane">
                        <h4>Edited</h4>
                        <div class="img-wrap"><canvas id="compare-canvas"></canvas></div>
                    </div>
                </div>
            </div>

            <div class="info-panel" id="info-panel">
                <span id="res-info">0 x 0 px</span> | <span id="zoom-info">100%</span>
            </div>
        </div>
    </main>

    <script>
        // State Management
        const state = {
            originalImage: null,
            currentImage: null, // Base image (after transforms but before filters/text)
            history: [],
            historyIndex: -1,
            rotation: 0,
            flipH: 1,
            flipV: 1,
            filters: {
                brightness: 100,
                contrast: 100,
                saturation: 100,
                blur: 0
            },
            textOverlays: [],
            isComparing: false
        };

        // DOM Elements
        const fileInput = document.getElementById('file-input');
        const uploadUI = document.getElementById('upload-ui');
        const canvasUI = document.getElementById('canvas-ui');
        const comparisonUI = document.getElementById('comparison-ui');
        const editorCanvas = document.getElementById('editor-canvas');
        const compareCanvas = document.getElementById('compare-canvas');
        const originalPreview = document.getElementById('original-preview');
        const ctx = editorCanvas.getContext('2d');
        const dropZone = document.getElementById('drop-zone');

        // Control Elements
        const brightnessSlider = document.getElementById('brightness-slider');
        const contrastSlider = document.getElementById('contrast-slider');
        const saturationSlider = document.getElementById('saturation-slider');
        const blurSlider = document.getElementById('blur-slider');
        const textInput = document.getElementById('text-input');
        const textColor = document.getElementById('text-color');
        const textSize = document.getElementById('text-size');
        const addTextBtn = document.getElementById('add-text-btn');
        const compareToggle = document.getElementById('compare-toggle');
        const undoBtn = document.getElementById('undo-btn');
        const redoBtn = document.getElementById('redo-btn');
        const resetBtn = document.getElementById('reset-btn');
        const downloadBtn = document.getElementById('download-btn');
        const resInfo = document.getElementById('res-info');

        // Initialization
        function init() {
            setupEventListeners();
            applyTheme();
        }

        function setupEventListeners() {
            fileInput.addEventListener('change', handleFileUpload);
            
            // Drag and Drop
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; });
            dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border)'; });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) handleFile(file);
            });
            uploadUI.addEventListener('click', () => fileInput.click());

            // Adjustments
            brightnessSlider.addEventListener('input', (e) => {
                state.filters.brightness = e.target.value;
                document.getElementById('brightness-val').textContent = e.target.value + '%';
                render();
            });
            contrastSlider.addEventListener('input', (e) => {
                state.filters.contrast = e.target.value;
                document.getElementById('contrast-val').textContent = e.target.value + '%';
                render();
            });
            saturationSlider.addEventListener('input', (e) => {
                state.filters.saturation = e.target.value;
                document.getElementById('saturation-val').textContent = e.target.value + '%';
                render();
            });
            blurSlider.addEventListener('input', (e) => {
                state.filters.blur = e.target.value;
                document.getElementById('blur-val').textContent = e.target.value + 'px';
                render();
            });

            // Transforms
            document.getElementById('rotate-l-btn').addEventListener('click', () => { state.rotation -= 90; saveHistory(); render(); });
            document.getElementById('rotate-r-btn').addEventListener('click', () => { state.rotation += 90; saveHistory(); render(); });
            document.getElementById('flip-h-btn').addEventListener('click', () => { state.flipH *= -1; saveHistory(); render(); });
            document.getElementById('flip-v-btn').addEventListener('click', () => { state.flipV *= -1; saveHistory(); render(); });

            // Text
            addTextBtn.addEventListener('click', () => {
                if (!textInput.value) return;
                state.textOverlays.push({
                    text: textInput.value,
                    color: textColor.value,
                    size: parseInt(textSize.value),
                    x: editorCanvas.width / 2,
                    y: editorCanvas.height / 2
                });
                textInput.value = '';
                saveHistory();
                render();
            });

            // Actions
            undoBtn.addEventListener('click', undo);
            redoBtn.addEventListener('click', redo);
            resetBtn.addEventListener('click', reset);
            downloadBtn.addEventListener('click', download);
            compareToggle.addEventListener('change', (e) => {
                state.isComparing = e.target.checked;
                toggleView();
            });

            document.getElementById('theme-toggle').addEventListener('click', () => {
                const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            });
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (file) handleFile(file);
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    state.originalImage = img;
                    originalPreview.src = img.src;
                    resetState();
                    enableControls();
                    render();
                    toggleView();
                    resInfo.textContent = `${img.width} x ${img.height} px`;
                    document.getElementById('info-panel').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function resetState() {
            state.rotation = 0;
            state.flipH = 1;
            state.flipV = 1;
            state.filters = { brightness: 100, contrast: 100, saturation: 100, blur: 0 };
            state.textOverlays = [];
            state.history = [];
            state.historyIndex = -1;
            saveHistory();
            updateSliders();
        }

        function updateSliders() {
            brightnessSlider.value = state.filters.brightness;
            contrastSlider.value = state.filters.contrast;
            saturationSlider.value = state.filters.saturation;
            blurSlider.value = state.filters.blur;
            document.getElementById('brightness-val').textContent = state.filters.brightness + '%';
            document.getElementById('contrast-val').textContent = state.filters.contrast + '%';
            document.getElementById('saturation-val').textContent = state.filters.saturation + '%';
            document.getElementById('blur-val').textContent = state.filters.blur + 'px';
        }

        function enableControls() {
            const controls = document.querySelectorAll('button, input');
            controls.forEach(c => c.disabled = false);
            undoBtn.disabled = state.historyIndex <= 0;
            redoBtn.disabled = state.historyIndex >= state.history.length - 1;
        }

        function toggleView() {
            if (!state.originalImage) return;
            if (state.isComparing) {
                canvasUI.style.display = 'none';
                comparisonUI.style.display = 'flex';
                renderCompare();
            } else {
                canvasUI.style.display = 'block';
                comparisonUI.style.display = 'none';
                uploadUI.style.display = 'none';
                render();
            }
        }

        function render() {
            if (!state.originalImage) return;
            drawToCanvas(editorCanvas);
        }

        function renderCompare() {
            drawToCanvas(compareCanvas);
        }

        function drawToCanvas(targetCanvas) {
            const img = state.originalImage;
            const targetCtx = targetCanvas.getContext('2d');
            
            // Calculate dimensions based on rotation
            const isVertical = (state.rotation / 90) % 2 !== 0;
            const width = isVertical ? img.height : img.width;
            const height = isVertical ? img.width : img.height;
            
            targetCanvas.width = width;
            targetCanvas.height = height;

            targetCtx.clearRect(0, 0, width, height);
            
            // Apply Filters
            targetCtx.filter = `
                brightness(${state.filters.brightness}%) 
                contrast(${state.filters.contrast}%) 
                saturate(${state.filters.saturation}%) 
                blur(${state.filters.blur}px)
            `;

            // Apply Transforms
            targetCtx.save();
            targetCtx.translate(width / 2, height / 2);
            targetCtx.rotate((state.rotation * Math.PI) / 180);
            targetCtx.scale(state.flipH, state.flipV);
            targetCtx.drawImage(img, -img.width / 2, -img.height / 2);
            targetCtx.restore();

            // Reset filter for text
            targetCtx.filter = 'none';

            // Draw Text Overlays
            state.textOverlays.forEach(item => {
                targetCtx.fillStyle = item.color;
                targetCtx.font = `bold ${item.size}px sans-serif`;
                targetCtx.textAlign = 'center';
                targetCtx.textBaseline = 'middle';
                targetCtx.fillText(item.text, item.x, item.y);
            });
        }

        function saveHistory() {
            const snapshot = JSON.stringify({
                rotation: state.rotation,
                flipH: state.flipH,
                flipV: state.flipV,
                filters: { ...state.filters },
                textOverlays: [...state.textOverlays]
            });
            
            // Remove future history if we're in the middle of undo stack
            if (state.historyIndex < state.history.length - 1) {
                state.history = state.history.slice(0, state.historyIndex + 1);
            }
            
            state.history.push(snapshot);
            state.historyIndex++;
            
            // Limit history size
            if (state.history.length > 20) {
                state.history.shift();
                state.historyIndex--;
            }
            
            updateUndoRedoButtons();
        }

        function undo() {
            if (state.historyIndex > 0) {
                state.historyIndex--;
                applyHistoryState();
            }
        }

        function redo() {
            if (state.historyIndex < state.history.length - 1) {
                state.historyIndex++;
                applyHistoryState();
            }
        }

        function applyHistoryState() {
            const data = JSON.parse(state.history[state.historyIndex]);
            state.rotation = data.rotation;
            state.flipH = data.flipH;
            state.flipV = data.flipV;
            state.filters = data.filters;
            state.textOverlays = data.textOverlays;
            updateSliders();
            render();
            if (state.isComparing) renderCompare();
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            undoBtn.disabled = state.historyIndex <= 0;
            redoBtn.disabled = state.historyIndex >= state.history.length - 1;
        }

        function reset() {
            if (confirm('Are you sure you want to reset all changes?')) {
                resetState();
                render();
                if (state.isComparing) renderCompare();
            }
        }

        function download() {
            const link = document.createElement('a');
            link.download = 'edited-image.png';
            link.href = editorCanvas.toDataURL('image/png');
            link.click();
        }

        function applyTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
        }

        init();
    </script>
</body>
</html>
